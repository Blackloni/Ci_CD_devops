name: CI/CD Pipeline

on:
  push:
    branches: ['main']  #déclenché sur push
  pull_request:
    branches: ['main'] # déclenché sur PR

jobs:

  # job 1 : LINT
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4 # clone le repo
      - uses: actions/setup-node@v4 # installe Node.js
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci 
      - run: npm run lint 
  
  # job 2 TEST
  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs: lint # lance seulement si lint passe
    steps:
      - uses: actions/checkout@v4 # clone le repo
      - uses: actions/setup-node@v4 # installe Node.js
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci 

      - name: Tests unitaire avec couverture
        run: npm test -- --coverage

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-prod
          path: coverage/
          retention-days: 30
  
  test-integration:
    name: Tests d'integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test-unit # lance seulement si test-unit passe
    steps:
      - uses: actions/checkout@v4 # clone le repo
      - uses: actions/setup-node@v4 # installe Node.js
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci 

      - name: Tests d'integration
        run: npm test
        env:
          NODE_ENV: test


  # job 4 build
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]
    timeout-minutes: 15

    steps:

      - uses: actions/checkout@v4 # clone le repo
      - uses: actions/setup-node@v4 # installe Node.js
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json 

      - name: Installation des dépendances 
        run: npm ci

      - name: build de production
        run: npm run build --if-present 

  # job 5: Deploy
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' # pas de deploy sur les PR
    steps:  
      # - name: Deployer vers render
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      
      - name: 'Verification du service'
        run: curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

